<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1120">
<title>Monitor Controller — Norcoast Audio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Open Sans', sans-serif;
    background: #0d1120;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .brand {
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.4s;
  }

  .tagline {
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.8s;
  }

  .back {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
    color: rgba(196,145,94,1);
    text-decoration: none;
    padding: 12px 24px;
    border: 1px solid rgba(196,145,94,0.4);
    border-radius: 50px;
    transition: border-color 0.3s, color 0.3s;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.2s;
  }
  .back:hover {
    border-color: rgba(196,145,94,0.5);
    color: rgba(196,145,94,1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand">Monitor Controller</div>
  <div class="tagline">Coming soon</div>
  <a class="back" href="/">Norcoast Audio</a>
</div>
</body>
</html>
