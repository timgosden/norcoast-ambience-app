    if(audioPaused){audioPaused=false;ctx.resume();const _t=ctx.currentTime;master.gain.cancelScheduledValues(_t);master.gain.setValueAtTime(master.gain.value,_t);master.gain.linearRampToValueAtTime(masterVol,_t+0.05);if(_drumMaster){_drumMaster.gain.cancelScheduledValues(_t);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,_t);_drumMaster.gain.linearRampToValueAtTime(masterVol,_t+ATTACK);}if(arpBus){arpBus.gain.cancelScheduledValues(_t);arpBus.gain.setValueAtTime(arpBus.gain.value,_t);arpBus.gain.linearRampToValueAtTime(1,_t+ATTACK);}}
    arpStep=0;
    const _fc=[...enabledEvolveIdx][0]??0;
    currentEvolve=_fc;pendingEvolve=-1;
    clearPendingChord();
    document.getElementById('stateEvolve').textContent=CHORD_TYPES[_fc].name;
    PAD_LAYERS.forEach(l=>{if(l.type!=="granular"&&layerState[l.id].volume>0)startPad(l,layerState[l.id].volume,homeRoot,currentEvolve)});
    scheduleEvolve();
    buildKeys();saveSettings();
  }
}
let compactMode=localStorage.getItem('norcoast_compact')==='1';
function toggleCompact(){
  compactMode=!compactMode;
  const perf=document.getElementById('perf');if(perf)perf.classList.toggle('compact',compactMode);
  const lbl=document.getElementById('compactLbl'),ico=document.getElementById('compactIco');
  if(compactMode){
    if(lbl)lbl.textContent='Full';
    if(ico)ico.innerHTML='<polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
  } else {
    if(lbl)lbl.textContent='Focus';
    if(ico)ico.innerHTML='<polyline points="4,14 4,20 10,20"/><polyline points="20,10 20,4 14,4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/>';
  }
  try{localStorage.setItem('norcoast_compact',compactMode?'1':'0')}catch(e){}
}
function updateQuickStrips(){
  const vi=document.getElementById('qsVolInp'),vp=document.getElementById('qsVolPct');
  const li=document.getElementById('qsLpfInp'),lp=document.getElementById('qsLpfPct');
  if(vi){const f=masterVol;vi.value=f;vi.style.background='linear-gradient(to right,rgba(196,145,94,0.55) '+f*100+'%,rgba(255,255,255,0.1) '+f*100+'%)';}
  if(vp)vp.textContent=Math.round(masterVol*100)+'%';
  if(li){li.value=lpfValue;li.style.background='linear-gradient(to right,rgba(106,159,216,0.55) '+lpfValue*100+'%,rgba(255,255,255,0.1) '+lpfValue*100+'%)';}
  if(lp)lp.textContent=formatHz(lpfFaderToHz(lpfValue));
}
function initQuickStrips(){
  const vi=document.getElementById('qsVolInp'),vp=document.getElementById('qsVolPct');
  const li=document.getElementById('qsLpfInp'),lp=document.getElementById('qsLpfPct');
  updateQuickStrips();
  vi.addEventListener('input',e=>{
    const f=parseFloat(e.target.value);
    masterVol=f;
    if(master)master.gain.linearRampToValueAtTime(masterVol,ctx.currentTime+0.05);
    if(_drumMaster)_drumMaster.gain.linearRampToValueAtTime(masterVol,ctx.currentTime+0.05);
    vi.style.background='linear-gradient(to right,rgba(196,145,94,0.55) '+f*100+'%,rgba(255,255,255,0.1) '+f*100+'%)';
    vp.textContent=Math.round(masterVol*100)+'%';
    queueSave();
  });
  li.addEventListener('input',e=>{
    const f=parseFloat(e.target.value);
    lpfValue=f;const hz=lpfFaderToHz(f);
    if(globalLPF)globalLPF.frequency.linearRampToValueAtTime(hz,ctx.currentTime+0.05);
    if(globalLPF2&&lpfSlope===24)globalLPF2.frequency.linearRampToValueAtTime(hz,ctx.currentTime+0.05);
    if(_drumLPF)_drumLPF.frequency.linearRampToValueAtTime(hz,ctx.currentTime+0.05);
    li.style.background='linear-gradient(to right,rgba(106,159,216,0.55) '+f*100+'%,rgba(255,255,255,0.1) '+f*100+'%)';
    lp.textContent=formatHz(hz);
    queueSave();
  });
}
async function initMIDI(){
  if(!navigator.requestMIDIAccess)return;
  try{
    const acc=await navigator.requestMIDIAccess();midiReady=true;
    const el=document.getElementById('midiBtn');if(el){el.className='evolve-pill on';el.textContent='MIDI ✓'}
    acc.inputs.forEach(i=>{i.onmidimessage=handleMIDI});
    midiOutputs=[];acc.outputs.forEach(o=>midiOutputs.push(o));
    acc.onstatechange=e=>{
      if(e.port.type==='input'&&e.port.state==='connected')e.port.onmidimessage=handleMIDI;
      if(e.port.type==='output'){midiOutputs=[];acc.outputs.forEach(o=>midiOutputs.push(o));}
    };
    if(document.getElementById('editSheet').classList.contains('open'))buildEditSheet();
  }catch(e){}
}

// ─── NATIVE BRIDGE API ───
// Called by the iOS Swift wrapper via evaluateJavaScript()
function norcoast_resume(){
  if(!ctx||!audioPaused)return;
  audioPaused=false;
  ctx.resume();
  const t=ctx.currentTime;
  master.gain.cancelScheduledValues(t);
  master.gain.setValueAtTime(master.gain.value,t);
  master.gain.linearRampToValueAtTime(masterVol,t+0.3);
  if(_drumMaster){_drumMaster.gain.cancelScheduledValues(t);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,t);_drumMaster.gain.linearRampToValueAtTime(masterVol,t+0.3);}
  if(arpBus){arpBus.gain.cancelScheduledValues(t);arpBus.gain.setValueAtTime(arpBus.gain.value,t);arpBus.gain.linearRampToValueAtTime(1,t+0.3);}
  const ab=document.querySelector('.key-btn.active');if(ab)ab.classList.remove('paused');
  if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';
  try{window.webkit.messageHandlers.bridge.postMessage('playing')}catch(_){}
}
function norcoast_pause(){
  if(!ctx||audioPaused)return;
  audioPaused=true;
  stopArp();
  const t=ctx.currentTime;
  master.gain.linearRampToValueAtTime(0,t+0.4);
  if(_drumMaster)_drumMaster.gain.linearRampToValueAtTime(0,t+0.4);
  if(arpBus)arpBus.gain.linearRampToValueAtTime(0,t+0.4);
  const ab=document.querySelector('.key-btn.active');if(ab)ab.classList.add('paused');
  if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';
  try{window.webkit.messageHandlers.bridge.postMessage('paused')}catch(_){}
}
function norcoast_togglePause(){if(audioPaused)norcoast_resume();else norcoast_pause();}

// ─── START ───
async function initAndStart(){
  const prompt=document.getElementById('audioPrompt');
  if(!prompt) return;
  prompt.onclick=null; // prevent double-tap
  const ls=document.getElementById('loadStatus');if(ls)ls.textContent='Loading…';
  try{
    await initAudio();
    await ctx.resume();
    // In the native iOS app the AVAudioSession is already set to .playback,
    // so the MediaStream workaround is unnecessary. Skip it to avoid redundant routing.
    if(!window.__NATIVE_APP__){
      try{
        const _msd=ctx.createMediaStreamDestination();
        const _sb=ctx.createBuffer(1,1,ctx.sampleRate);
        const _ss=ctx.createBufferSource();_ss.buffer=_sb;_ss.loop=true;
        _ss.connect(_msd);_ss.start();
        const _ae=document.createElement('audio');
        _ae.setAttribute('playsinline','');_ae.setAttribute('x-webkit-airplay','deny');
        _ae.srcObject=_msd.stream;_ae.volume=0.001;
        document.body.appendChild(_ae);
        await _ae.play();
      }catch(_){}
    }
    if('mediaSession' in navigator){
      navigator.mediaSession.playbackState='playing';
      try{navigator.mediaSession.metadata=new MediaMetadata({title:'NorCoast Ambience'})}catch(_){}
    }
    await decodeSample();
    PAD_LAYERS.forEach(l=>{
      if(l.type==="granular"){if(layerState[l.id].volume>0)startGranular(layerState[l.id].volume);return}
      startPad(l,layerState[l.id].volume,homeRoot,currentEvolve);
    });
    if(shimmerVol>0)startShimmer(shimmerVol);
    startClick();
    if(arpVol>0)startArp();
    if(movementVol>0)startMovement();
    if(window.__NATIVE_APP__){
      // Native wrapper: AVAudioSession manages backgrounding — don't suspend the
      // AudioContext ourselves or every notification banner causes a glitch.
      document.addEventListener('visibilitychange',()=>{
        if(ctx&&ctx.state==='suspended'&&!audioPaused&&document.visibilityState==='visible')ctx.resume();
      });
    } else {
      // Ambient app: keep playing in background tabs. Browser may still throttle
      // timers, but the AudioContext keeps running. Resume on return in case
      // the browser auto-suspended.
      document.addEventListener('visibilitychange',()=>{
        if(!ctx)return;
        if(document.visibilityState==='visible'&&ctx.state==='suspended'&&!audioPaused)ctx.resume();
      });
      window.addEventListener('focus',()=>{if(ctx&&ctx.state==='suspended'&&!audioPaused)ctx.resume()});
      window.addEventListener('pagehide',e=>{
        // Only tear down on actual unload — if persisted=true the browser is
        // freezing the page into bfcache and will restore it on back-nav. Closing
        // ctx in that case leaves the user with no audio when they return.
        if(!e.persisted&&ctx)ctx.close();
      });
    }
    loadMidiMappings();buildKeys();startVis();scheduleEvolve();initMIDI();updatePerfSetlist();initQuickStrips();
    if(compactMode)toggleCompact();
    // Swipe down to close edit sheet
    {const sheet=document.getElementById('editSheet');let _sy=0,_sw=false;
    sheet.addEventListener('touchstart',e=>{if(e.touches.length===1&&e.target.closest('input[type=range]')==null){_sy=e.touches[0].clientY;_sw=true;}},{passive:true});
    sheet.addEventListener('touchend',e=>{if(_sw){const dy=e.changedTouches[0].clientY-_sy;if(dy>70)closeEdit();_sw=false;}},{passive:true});}
    {const eb=document.getElementById('evolveBtn');if(eb){eb.className='evolve-pill '+(evolving?'on':'off');eb.textContent=evolving?'Evolving':'Static'}}
    {const xb=document.getElementById('clickX2Btn');if(xb)xb.className='evolve-pill '+(clickRateX2?'on':'off');}
    const _bd=document.getElementById('bpmDisplay');if(_bd)_bd.textContent=clickBPM;
    {const se=document.getElementById('stateEvolve');if(se&&CHORD_TYPES[currentEvolve])se.textContent=CHORD_TYPES[currentEvolve].name;}
  }catch(e){if(ls)ls.textContent='Error: '+e.message;}
  finally{
    prompt.style.opacity='0';
    setTimeout(()=>{try{prompt.remove()}catch(_){}},700);
  }
}
