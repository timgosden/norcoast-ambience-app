<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#030508">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<title>Norcoast Ambience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#030508}
  body{font-family:'Open Sans',sans-serif;color:#fff;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
  /* ── Performance layout ── */
  #perf{position:fixed;inset:0;display:flex;flex-direction:column;background:linear-gradient(160deg,#07090e,#0b0f1a 40%,#06080d);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  @media(min-width:500px){
    .perf-keys{grid-template-columns:repeat(6,1fr);gap:6px;padding:0 20px 4px}
    .key-btn{aspect-ratio:unset;height:clamp(52px,8vh,72px);border-radius:12px;font-size:15px}
    .key-btn.sharp{font-size:12px}
    .perf-vis-wrap{height:44px;padding:4px 20px}
    .perf-bottom{padding:6px 20px 12px}
    #editSheet{left:0;right:0;transform:none;max-width:none}
  }
  @media(min-width:1100px){
    .perf-keys{grid-template-columns:repeat(12,1fr);gap:8px;padding:0 28px 4px}
    .key-btn{height:clamp(60px,9vh,84px);border-radius:14px;font-size:16px}
    .key-btn.sharp{font-size:13px}
  }  .bpm-tap-main{display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(196,145,94,0.1);border:1px solid rgba(196,145,94,0.3);border-radius:10px;padding:5px 12px;cursor:pointer;color:rgba(196,145,94,0.9);transition:background 0.1s,border-color 0.1s;gap:0;min-width:56px;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  .bpm-tap-main:active{background:rgba(196,145,94,0.22);border-color:rgba(196,145,94,0.6)}
  .bpm-tap-main #bpmDisplay{font-size:18px;font-weight:700;font-family:'Open Sans',sans-serif;line-height:1}
  .bpm-tap-label{font-size:9px;letter-spacing:1px;opacity:0.7;margin-top:1px}
  .perf-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;position:relative;z-index:45}
  .perf-logo{flex-shrink:0;width:36px;display:flex;align-items:center}
  .perf-state{flex:1;text-align:center;font-weight:300;line-height:1;overflow:hidden;min-width:0}
  .perf-state .root{color:#c4915e;font-size:42px;font-weight:300;letter-spacing:2px}
  .perf-state .sep{color:rgba(255,255,255,0.18);margin:0 8px;font-size:22px}
  .perf-state .evo{color:rgba(255,255,255,0.82);font-size:22px;font-weight:300;letter-spacing:1px;transition:color 0.15s;white-space:nowrap}
  .perf-state .evo.evo-flash{color:#c4915e}
  .perf-state .evo-pend{color:#6a9fd8;font-size:22px;font-weight:300;letter-spacing:1px;opacity:0;transition:opacity 0.4s;white-space:nowrap}
  .edit-btn{border-radius:10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 12px;cursor:pointer;color:rgba(255,255,255,0.75);transition:all 0.2s;flex-shrink:0;gap:3px}
  .edit-btn:active{background:rgba(255,255,255,0.15)}
  .edit-btn:active{background:rgba(255,255,255,0.12)}
  /* ── Visualiser ── */
  .perf-vis-wrap{height:54px;padding:6px 16px;flex-shrink:0;display:flex;align-items:center;overflow:hidden;transition:height 0.3s ease,padding 0.3s ease}
  #visualiser{width:100%;border-radius:6px;display:block;height:42px}
  /* ── Setlist ── */
  .perf-setlist{flex:1;min-height:0;padding:4px 12px 4px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:none}
  .perf-setlist::-webkit-scrollbar{display:none}
  .setlist-item{display:flex;flex-direction:column;padding:13px 16px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:all 0.15s;text-align:left;width:100%;flex-shrink:0}
  .setlist-item.active{background:rgba(196,145,94,0.11);border-color:rgba(196,145,94,0.35)}
  .setlist-item-name{font-size:17px;font-weight:500;color:rgba(255,255,255,0.7);letter-spacing:0.2px}
  .setlist-item.active .setlist-item-name{color:#c4915e}
  .setlist-item-meta{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;margin-top:3px}
  .setlist-empty{padding:24px 16px;text-align:center;font-size:12px;color:rgba(255,255,255,0.18);letter-spacing:0.5px}
  /* ── Key grid ── */
  .perf-keys{padding:0 12px;flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;border-top:1px solid rgba(255,255,255,0.07);margin-top:6px;padding-top:10px;padding-bottom:6px}
  #perf.compact .perf-keys{padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px))}
  .key-btn{aspect-ratio:1;border-radius:16px;font-size:16px;font-family:'Open Sans',sans-serif;font-weight:500;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s,box-shadow 0.15s;display:flex;align-items:center;justify-content:center;letter-spacing:0.5px;width:100%}
  .key-btn.sharp{font-size:13px}
  .key-btn.active{background:rgba(196,145,94,0.18);border-color:rgba(196,145,94,0.45);color:#c4915e;box-shadow:0 0 20px rgba(196,145,94,0.12)}
  .key-btn.sharp.active{color:#c4915e}
  .key-btn.active.paused{background:rgba(196,145,94,0.04);border-color:rgba(196,145,94,0.15);color:rgba(196,145,94,0.35);box-shadow:none}
  .key-btn.sharp.active.paused{color:rgba(196,145,94,0.35)}
  /* ── Bottom bar ── */
  .perf-quickstrip{flex-shrink:0;padding:8px 0 2px;border-top:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;gap:4px}
  .perf-vol-row{display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0}
  .perf-vol-row input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;border-radius:2px;outline:none;cursor:pointer;accent-color:#c4915e;background:rgba(255,255,255,0.15)}
  .perf-vol-row.lpf-row input[type=range]{accent-color:#6a9fd8}
  .perf-vol-icon{font-size:11px;color:rgba(255,255,255,0.5);flex-shrink:0;letter-spacing:1px;text-transform:uppercase;width:28px}
  .perf-vol-pct{font-size:11px;color:rgba(255,255,255,0.5);flex-shrink:0;width:42px;text-align:right;font-variant-numeric:tabular-nums}
  .perf-bottom{display:flex;align-items:center;justify-content:center;padding:8px 10px calc(16px + env(safe-area-inset-bottom, 0px));flex-shrink:0;gap:6px;position:relative;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease;max-height:120px}
  #perf.compact .perf-vis-wrap{height:0;padding-top:0;padding-bottom:0}
  #perf.compact .perf-bottom{max-height:0;padding-top:0;padding-bottom:0}
  #perf.compact .perf-quickstrip{display:none}
  .app-version{position:absolute;bottom:calc(4px + env(safe-area-inset-bottom, 0px));right:10px;font-size:9px;color:rgba(255,255,255,0.38);letter-spacing:0.5px;pointer-events:none;font-variant-numeric:tabular-nums}
  .bpm-click-group{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:4px 6px}
  .evolve-pill{padding:8px 13px;border-radius:20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all 0.3s;border:1px solid transparent}
  .fade-btn{display:flex;align-items:center;justify-content:center;padding:8px 13px;border-radius:20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:500;cursor:pointer;transition:border-color 0.3s,color 0.3s,box-shadow 0.3s;border:1px solid rgba(212,107,138,0.35);background:rgba(212,107,138,0.08);color:rgba(212,107,138,0.7);touch-action:manipulation;position:relative;overflow:hidden}
  .fade-btn:active{transform:scale(0.95)}
  .fade-btn.fading{border-color:rgba(212,107,138,0.55);color:rgba(212,107,138,1);background:rgba(212,107,138,0.06);box-shadow:0 0 10px rgba(212,107,138,0.18)}
  .fade-btn.fading::before{content:'';position:absolute;inset:0;background:rgba(212,107,138,0.22);transform-origin:left;animation:fade-drain 6s linear forwards;border-radius:inherit}
  @keyframes fade-drain{from{transform:scaleX(1)}to{transform:scaleX(0)}}
  .evolve-pill.on{background:rgba(106,159,216,0.12);border-color:rgba(106,159,216,0.28);color:rgba(106,159,216,0.8)}
  .evolve-pill.off{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.28)}
  /* ── Edit backdrop ── */
  #editBackdrop{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;z-index:40;transition:background 0.3s}
  #editBackdrop.visible{background:rgba(0,0,0,0.52);pointer-events:all}
  /* ── Edit sheet ── */
  #editSheet{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(180deg,#0e1120 0%,#090c16 100%);border-radius:24px 24px 0 0;border-top:1px solid rgba(255,255,255,0.15);box-shadow:0 -8px 40px rgba(0,0,0,0.5);transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);max-height:84vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;z-index:50;padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  #editSheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 2px;cursor:pointer}
  /* ── Edit content ── */
  .edit-section{padding:20px 20px 0}
  .edit-title{font-size:9px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,0.22);font-weight:600;margin-bottom:14px}
  .edit-divider{height:1px;background:rgba(255,255,255,0.06);margin:20px 0 0}
  /* ── Chord pills ── */
  .chord-pills{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
  .chord-pill{padding:10px 18px;border-radius:22px;font-size:12px;font-weight:500;letter-spacing:1px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.38)}
  .chord-pill.active{background:rgba(196,145,94,0.16);border-color:rgba(196,145,94,0.38);color:#c4915e}
  /* ── Layer rows ── */
  .edit-layer{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .layer-dot-btn{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.3s;border:1.5px solid rgba(255,255,255,0.1);background:transparent}
  .layer-dot{width:8px;height:8px;border-radius:50%;transition:all 0.3s}
  .edit-layer-name{font-size:13px;font-weight:400;color:rgba(255,255,255,0.5);width:82px;flex-shrink:0;transition:color 0.3s}
  /* ── Slider rows ── */
  .slider-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .slider-row:last-child{border-bottom:none}
  .slider-lbl{font-size:12px;color:rgba(255,255,255,0.42);width:88px;flex-shrink:0;letter-spacing:0.2px}
  .slider-val{font-size:11px;color:rgba(255,255,255,0.3);width:44px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:0.3px}
  input[type=range]{flex:1;height:3px;-webkit-appearance:none;appearance:none;border-radius:2px;outline:none;cursor:pointer;margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;margin-top:-8px;box-shadow:0 1px 4px rgba(0,0,0,0.45)}
  .edit-bottom-pad{height:28px}
  .eq-toggle{width:100%;padding:10px 0;margin:10px 0 0;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:12px;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
  .eq-toggle:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8)}
  .eq-panel{display:none;margin-top:14px}
  .eq-panel.open{display:block}
  .sub-panel-toggle{width:100%;padding:8px 0;margin:8px 0 0;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
  .sub-panel-toggle:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8)}
  .sub-panel{display:none;margin-top:10px;padding:10px 0 4px}
  .sub-panel.open{display:block}
  .chord-note-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:6px 0 4px}
  .chord-note-btn{padding:7px 2px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);font-size:9px;text-align:center;cursor:pointer;transition:all 0.2s;line-height:1.4}
  .chord-note-btn.active{background:rgba(106,159,216,0.18);border-color:rgba(106,159,216,0.45);color:rgba(106,159,216,0.95)}
  .chord-note-btn.root{background:rgba(196,145,94,0.15);border-color:rgba(196,145,94,0.4);color:rgba(196,145,94,0.85);cursor:default}
  .seq-row-wrap{display:flex;align-items:center;gap:5px;margin-bottom:5px}
  .seq-label{font-size:9px;color:rgba(255,255,255,0.38);width:18px;flex-shrink:0;text-align:center;letter-spacing:0.5px}
  .seq-row{display:grid;grid-template-columns:repeat(16,1fr);gap:2px;flex:1}
  .seq-step{height:22px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;touch-action:manipulation;transition:background 0.1s,border-color 0.1s}
  .seq-step.on-lo{background:rgba(196,145,94,0.55);border-color:rgba(196,145,94,0.8)}
  .seq-step.on-md{background:rgba(94,184,138,0.55);border-color:rgba(94,184,138,0.8)}
  .seq-step.on-hh{background:rgba(106,159,216,0.55);border-color:rgba(106,159,216,0.8)}
.eq-section-title{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.25);text-transform:uppercase;margin:14px 0 8px;padding-left:2px}
  .slope-row{display:flex;align-items:center;gap:8px;margin:8px 0 4px;flex-wrap:wrap}
  .slope-label{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.5px;flex:1}
  .slope-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);font-size:11px;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px}
  .slope-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.85)}
  .oct-btn.active{background:rgba(196,145,94,0.18);border-color:rgba(196,145,94,0.5);color:#c4915e;box-shadow:0 0 12px rgba(196,145,94,0.15)}
  .preset-save-row{display:flex;gap:8px;margin:12px 0 4px}
  .preset-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 12px;color:rgba(255,255,255,0.85);font-size:13px;outline:none;font-family:'Open Sans',sans-serif}
  .preset-input::placeholder{color:rgba(255,255,255,0.2)}
  .preset-save-btn{padding:10px 16px;border-radius:8px;border:1px solid rgba(196,145,94,0.35);background:rgba(196,145,94,0.1);color:#c4915e;font-size:12px;cursor:pointer;white-space:nowrap;letter-spacing:0.5px}
  .preset-export-btn{width:100%;margin-top:12px;padding:9px 0;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
  .preset-export-btn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)}
  .preset-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s,transform 0.1s}
  .drag-handle{color:rgba(255,255,255,0.2);font-size:18px;padding:4px 6px;cursor:grab;touch-action:none;user-select:none;line-height:1;flex-shrink:0}
  .drag-handle:active{cursor:grabbing;color:rgba(196,145,94,0.6)}
  .preset-row.dragging{opacity:0.55;position:relative;z-index:10;background:rgba(255,255,255,0.04)}
  .preset-row.active .preset-name{color:#c4915e}
  .preset-row.active{border-bottom-color:rgba(196,145,94,0.15)}
  .preset-active-row{display:flex;align-items:center;gap:10px;padding:10px 0 14px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:4px}
  .preset-active-name{flex:1;font-size:14px;color:rgba(255,255,255,0.75);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .preset-update-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(196,145,94,0.5);background:rgba(196,145,94,0.12);color:#c4915e;font-size:11px;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;flex-shrink:0}
  .sheet-tab-bar{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.07);margin:8px 16px 0}
  .sheet-tab{flex:1;padding:10px 0;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;text-align:center;color:rgba(255,255,255,0.3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s,border-color 0.2s}
  .sheet-tab.active{color:#c4915e;border-bottom-color:#c4915e}
  .fx-section-header{font-size:10px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.55);text-transform:uppercase;padding:8px 12px;margin:10px -16px 6px;}
  .preset-drag{font-size:16px;color:rgba(255,255,255,0.2);cursor:grab;padding:0 2px;user-select:none;flex-shrink:0}
  .preset-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .preset-name{font-size:13px;color:rgba(255,255,255,0.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .preset-meta{font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.5px}
  .preset-load-btn{padding:7px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);font-size:11px;cursor:pointer;letter-spacing:0.5px}
  .preset-del-btn{padding:7px 10px;border-radius:7px;border:1px solid rgba(255,80,80,0.2);background:transparent;color:rgba(255,80,80,0.35);font-size:11px;cursor:pointer}
  .preset-empty{font-size:12px;color:rgba(255,255,255,0.2);padding:10px 0;text-align:center}
  .cc-learn-btn{font-size:9px;padding:2px 6px;border-radius:8px;border:1px solid rgba(196,145,94,0.3);background:rgba(196,145,94,0.08);color:rgba(196,145,94,0.7);cursor:pointer;margin-right:4px;transition:all 0.15s;white-space:nowrap}
  .cc-learn-btn.pending{border-color:rgba(196,145,94,0.8);background:rgba(196,145,94,0.2);color:rgba(196,145,94,1);animation:learnPulse 0.7s ease-in-out infinite alternate}
  @keyframes learnPulse{from{opacity:0.6}to{opacity:1}}
  .cc-badge{font-size:9px;padding:2px 5px;border-radius:6px;background:rgba(94,184,138,0.12);border:1px solid rgba(94,184,138,0.3);color:rgba(94,184,138,0.8);cursor:pointer;margin-right:4px}
  .cc-badge:hover{background:rgba(220,60,60,0.15);border-color:rgba(220,80,80,0.4);color:rgba(220,100,100,0.9)}
  .midi-map-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;padding:4px 0}
  .midi-cc{font-size:10px;color:rgba(196,145,94,0.7);letter-spacing:0.5px;font-weight:600;white-space:nowrap;padding:3px 0}
  .midi-lbl{font-size:10px;color:rgba(255,255,255,0.45);padding:3px 0}
  .midi-dot{font-size:9px;letter-spacing:1.5px;padding:5px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.2);display:inline;cursor:pointer;transition:all 0.2s}
  .midi-dot.on{display:inline;color:rgba(94,184,138,0.7);border-color:rgba(94,184,138,0.2);background:rgba(94,184,138,0.06)}
  .bpm-row{display:flex;align-items:center;gap:10px;margin:10px 0 4px}
  .bpm-label{font-size:12px;color:rgba(255,255,255,0.4);min-width:36px}
  .bpm-input{width:64px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 10px;color:rgba(255,255,255,0.85);font-size:15px;font-family:'Open Sans',sans-serif;text-align:center;outline:none}
  .bpm-nudge{padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);font-size:14px;cursor:pointer}
  .bpm-tap{flex:1;padding:8px 0;border-radius:8px;border:1px solid rgba(196,145,94,0.25);background:rgba(196,145,94,0.06);color:rgba(196,145,94,0.65);font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:background 0.1s;touch-action:manipulation}
  .bpm-tap:active{background:rgba(196,145,94,0.2)}
</style>
</head>
<body>
<!-- Tap-to-start -->
<div id="audioPrompt" onclick="initAndStart()" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080b14;cursor:pointer;transition:opacity 0.8s;padding:40px">
  <svg width="84" height="84" viewBox="0 0 100 100" fill="none" style="margin-bottom:28px">
    <circle cx="50" cy="50" r="46" stroke="rgba(196,145,94,0.15)" stroke-width="1"/>
    <circle cx="50" cy="50" r="46" stroke="rgba(196,145,94,0.55)" stroke-width="1.5" stroke-dasharray="289" stroke-dashoffset="289" style="animation:splashRing 2s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;transform-origin:50px 50px;transform:rotate(-90deg)"/>
    <path d="M 18 50 Q 29 30, 40 50 Q 51 70, 62 50 Q 73 30, 84 50" stroke="rgba(196,145,94,0.9)" stroke-width="2.5" stroke-linecap="round" fill="none" style="animation:splashPath 1s ease-out 0.6s both;stroke-dasharray:120;stroke-dashoffset:120"/>
    <path d="M 18 50 Q 29 38, 40 50 Q 51 62, 62 50 Q 73 38, 84 50" stroke="rgba(94,184,138,0.55)" stroke-width="1.5" stroke-linecap="round" fill="none" style="animation:splashPath 1s ease-out 0.85s both;stroke-dasharray:110;stroke-dashoffset:110"/>
    <path d="M 22 50 Q 33 42, 44 50 Q 55 58, 66 50 Q 77 42, 88 50" stroke="rgba(212,107,138,0.35)" stroke-width="1" stroke-linecap="round" fill="none" style="animation:splashPath 1s ease-out 1.05s both;stroke-dasharray:105;stroke-dashoffset:105"/>
  </svg>
  <div style="font-size:10px;letter-spacing:5px;color:rgba(196,145,94,0.5);text-transform:uppercase;font-family:'Open Sans',sans-serif;margin-bottom:8px;animation:splashFade 0.8s ease-out 1.2s both">Norcoast Audio</div>
  <div style="font-size:32px;font-weight:200;letter-spacing:4px;color:rgba(255,255,255,0.9);font-family:'Open Sans',sans-serif;margin-bottom:48px;animation:splashFade 0.8s ease-out 1.4s both">Ambience</div>
  <div style="font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.75);text-transform:uppercase;font-family:'Open Sans',sans-serif;background:rgba(196,145,94,0.15);border:1px solid rgba(196,145,94,0.35);border-radius:24px;padding:12px 28px;animation:splashPulse 2.5s ease-in-out 2s infinite">Tap to begin</div>
  <div id="loadStatus" style="font-size:10px;color:rgba(255,255,255,0.12);margin-top:12px"></div>
  <div style="position:absolute;bottom:14px;right:16px;font-size:9px;color:rgba(255,255,255,0.38);letter-spacing:0.5px;pointer-events:none">v1.54</div>
</div>
<style>
@keyframes splashRing{to{stroke-dashoffset:0}}
@keyframes splashPath{to{stroke-dashoffset:0;opacity:1}}
@keyframes splashFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes splashPulse{0%,100%{opacity:0.22}50%{opacity:0.65}}
</style>
<!-- Performance mode -->
<div id="perf">
  <div class="perf-top">
    <div class="perf-logo">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="46" stroke="rgba(196,145,94,0.3)" stroke-width="1.5"/>
        <path d="M 20 50 Q 30 35, 40 50 Q 50 65, 60 50 Q 70 35, 80 50" stroke="rgba(196,145,94,0.7)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M 20 50 Q 30 40, 40 50 Q 50 60, 60 50 Q 70 40, 80 50" stroke="rgba(94,184,138,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="perf-state">
      <span class="root" id="stateRoot">C</span><span class="sep">·</span><span class="evo" id="stateEvolve">5th</span><span class="sep" id="statePendSep" style="opacity:0">·</span><span class="evo-pend" id="statePending"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="edit-btn" id="compactBtn" onclick="toggleCompact()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="compactIco"><polyline points="4,14 4,20 10,20"/><polyline points="20,10 20,4 14,4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span style="font-size:9px;letter-spacing:0.5px;margin-top:1px" id="compactLbl">Focus</span>
      </button>
      <button class="edit-btn" id="setlistTabBtn" onclick="openSetlist()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        <span style="font-size:9px;letter-spacing:0.5px;margin-top:1px">Setlist</span>
      </button>
      <button class="edit-btn" id="createTabBtn" onclick="openCreate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span style="font-size:9px;letter-spacing:0.5px;margin-top:1px">Create</span>
      </button>
    </div>
  </div>
  <div class="perf-vis-wrap">
    <canvas id="visualiser" width="800" height="300"></canvas>
  </div>
  <div class="perf-setlist" id="perfSetlist"></div>
  <div class="perf-quickstrip">
    <div class="perf-vol-row">
      <span class="perf-vol-icon">Vol</span>
      <input type="range" id="qsVolInp" min="0" max="1" step="0.001" value="0.794">
      <span class="perf-vol-pct" id="qsVolPct">50%</span>
    </div>
    <div class="perf-vol-row lpf-row">
      <span class="perf-vol-icon">LPF</span>
      <input type="range" id="qsLpfInp" min="0" max="1" step="0.001" value="1">
      <span class="perf-vol-pct" id="qsLpfPct">20kHz</span>
    </div>
  </div>
  <div class="perf-keys" id="keyRow"></div>
  <div class="perf-bottom">
    <button id="fadeBtn" class="fade-btn" onclick="triggerFade()">Stop</button>
    <button id="evolveBtn" class="evolve-pill on" onclick="toggleEvolving()">Evolving</button>
    <div class="bpm-click-group">
      <button class="bpm-tap-main" id="bpmTapMain" onclick="tapTempo()" onpointerdown="onBpmPointerDown()" onpointerup="onBpmPointerUp()" onpointerleave="onBpmPointerUp()" onpointercancel="onBpmPointerUp()" title="Tap · Hold to type"><span id="bpmDisplay">70</span><span class="bpm-tap-label">BPM</span></button>
      <button id="clickBtn" class="evolve-pill off" onclick="toggleClick()">Click</button>
      <button id="clickX2Btn" class="evolve-pill off" onclick="toggleClickX2()" style="padding:8px 10px;font-size:9px;letter-spacing:1px">x2</button>
    </div>
    <div class="app-version">v1.54</div>
  </div>
</div>
<!-- Edit backdrop -->
<div id="editBackdrop" onclick="closeEdit()"></div>
<!-- Edit sheet -->
<div id="editSheet">
  <div class="sheet-handle" onclick="closeEdit()"></div>
  <div id="editContent"></div>
</div>

  const r=new Float32Array(h.length+1),im=new Float32Array(h.length+1);

}

// ─── REVERB (Parallel FDN — 8 comb filters + 4 allpass diffusers) ───
function createDattorroReverb(){
  const node=new AudioWorkletNode(ctx,'DattorroReverb',{outputChannelCount:[2]});
  // Wet=1, dry=0 — crossfade handled externally via reverbGain/dryGain
  node.parameters.get('wet').value=1.0;
  node.parameters.get('dry').value=0.0;
  node.parameters.get('bandwidth').value=0.9995;
  node.parameters.get('inputDiffusion1').value=0.75;
  node.parameters.get('inputDiffusion2').value=0.625;
  node.parameters.get('decayDiffusion1').value=0.7;
  node.parameters.get('decayDiffusion2').value=0.5;
  node.parameters.get('damping').value=0.0005;
  node.parameters.get('preDelay').value=Math.round(0.02*ctx.sampleRate);
  node.parameters.get('decay').value=reverbSizeToFB(reverbSize);
  node.parameters.get('excursionRate').value=0.3+reverbMod*1.7;
  node.parameters.get('excursionDepth').value=reverbMod*1.5;
  const decP=node.parameters.get('decay');
  const fbProxy={gain:{
    get value(){return decP.value},
    set value(v){decP.value=v},
    linearRampToValueAtTime(v,t){decP.linearRampToValueAtTime(v,t)},
    setValueAtTime(v,t){decP.setValueAtTime(v,t)},
    cancelScheduledValues(t){decP.cancelScheduledValues(t)}
  }};
  return{input:node,output:node,fbGain:fbProxy,
         excDepth:node.parameters.get('excursionDepth'),
         excRate:node.parameters.get('excursionRate')};
}

// ─── DECODE EMBEDDED SAMPLE ───
async function decodeSample(){
  const binary=atob(DULCIMER_B64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  dulcimerBuf=await ctx.decodeAudioData(bytes.buffer);
}

// ─── GRANULAR ENGINE ───
// Smooth overlapping grains from dulcimer, pitched to current voicing
// Pre-reverse the buffer for genuine reverse playback

function createReversedBuffer(buf){
  const rev=ctx.createBuffer(buf.numberOfChannels,buf.length,buf.sampleRate);
  for(let ch=0;ch<buf.numberOfChannels;ch++){
    const src=buf.getChannelData(ch);
    const dst=rev.getChannelData(ch);
    for(let i=0;i<buf.length;i++) dst[i]=src[buf.length-1-i];
  }
  return rev;
}

function startGranular(vol,atk){
  if(atk==null)atk=ATTACK;
  if(!dulcimerBuf||vol<=0) return;
  stopGranular();
  if(!reversedBuf) reversedBuf=createReversedBuffer(dulcimerBuf);

  granularGain=ctx.createGain();
  granularGain.gain.setValueAtTime(0,ctx.currentTime);
  granularGain.gain.linearRampToValueAtTime(vol*0.8,ctx.currentTime+atk);
  granularGain.connect(master);

  // 5 streams: root, 5th, evolve voice, root+oct, 5th+oct
  for(let stream=0;stream<5;stream++){
    const delay=stream*200;
    granularTimers[stream]=setTimeout(()=>grainStream(stream),delay);
  }
}

function grainStream(streamId){
  if(!granularGain||layerState.texture.volume<=0) return;

  const rootFreq=noteFreq(homeRoot,ROOT_OCT);
  const fifthFreq=semiFreq(rootFreq,7);
  const chordSemis=CHORD_TYPES[currentEvolve].semis;
  const evolveFreq=semiFreq(rootFreq,chordSemis[Math.floor(Math.random()*chordSemis.length)]);

  // Each stream targets a different pitch for harmonic spread
  // Streams 0-2: root, 5th, evolve at base octave
  // Streams 3-4: root+oct, 5th+oct for shimmer
  const pitchOptions=[rootFreq,fifthFreq,evolveFreq,rootFreq,fifthFreq];
  const baseFreq=pitchOptions[streamId%pitchOptions.length];

  // Pitch ratio relative to sample (C2)
  const ratio=baseFreq/C2;
  // Streams 3+ play an octave up for shimmer
  // +Octave button adds another octave on top of everything
  const baseOctShift=textureOctUp?1:0;
  const octShift=(streamId>=3?1:0)+baseOctShift;
  const finalRate=ratio*Math.pow(2,octShift);

  const now=ctx.currentTime;

  const baseGrain=0.08+0.5*0.5*1.92; // 550ms base grain
  const grainDur=baseGrain*(0.7+Math.random()*0.6);
  const adjustedDur=grainDur/finalRate; // actual playback time

  // Use reversed buffer ~60% of the time for that reverse swell character
  const useReverse=Math.random()>0.4;
  const buf=useReverse?reversedBuf:dulcimerBuf;

  // Random start position — avoid the very start/end
  const margin=0.2;
  const maxStart=Math.max(0,buf.duration-grainDur-margin);
  const grainStart=margin+Math.random()*maxStart;

  const src=ctx.createBufferSource();
  src.buffer=buf;
  const pitchRandCents=(Math.random()-0.5)*24; // ±12 cents spread
  src.playbackRate.value=finalRate*Math.pow(2,pitchRandCents/1200);

  // Hann window envelope — smooth in, smooth out, no clicks
  const env=ctx.createGain();
  const fadeTime=adjustedDur*0.3; // 30% fade in/out
  const grainLevel=streamId>=3?0.12:0.15; // slightly lower for shimmer octave
  env.gain.setValueAtTime(0,now);
  env.gain.linearRampToValueAtTime(grainLevel,now+fadeTime);
  env.gain.setValueAtTime(grainLevel,now+adjustedDur-fadeTime);
  env.gain.linearRampToValueAtTime(0,now+adjustedDur);

  // Stereo placement — wider spread for shimmer streams
  const pan=ctx.createStereoPanner();
  const basePan=(streamId-2)*0.3; // spread across -0.6 to 0.6
  pan.pan.value=Math.max(-1,Math.min(1,basePan+(Math.random()-0.5)*0.7));

  src.connect(env);
  env.connect(pan);
  if(!granularGain)return; // stopGranular() called mid-execution
  pan.connect(granularGain);

  src.start(now,grainStart,grainDur);
  src.onended=()=>{try{src.disconnect();env.disconnect();pan.disconnect()}catch(e){}};

  // Schedule next grain using audio clock: wake up when current grain is 65% done
  const overlap=adjustedDur*0.65;
  const nextGrainAt=now+(adjustedDur-overlap)*(0.8+Math.random()*0.4);
  const msUntilNext=Math.max(50,(nextGrainAt-ctx.currentTime)*1000);
  granularTimers[streamId]=setTimeout(()=>grainStream(streamId),msUntilNext);
}

function stopGranular(rel){
  if(rel==null)rel=RELEASE;
  Object.values(granularTimers).forEach(t=>clearTimeout(t));
  granularTimers={};
  if(granularGain){
    const now=ctx.currentTime;
    granularGain.gain.linearRampToValueAtTime(0,now+rel);
    const g=granularGain;
    setTimeout(()=>{try{g.disconnect()}catch(e){}},rel*1000+500);
    granularGain=null;
  }
}


// ─── AUDIO INIT ───
async function initAudio(){

  }catch(e){console.error('Dattorro reverb worklet failed to load:',e);}
  try{
    await ctx.audioWorklet.addModule('./phase-vocoder-worklet.js');
  }catch(e){console.error('Phase vocoder worklet failed to load:',e);}

  // and was coming in at full volume on every resume.

  globalLPF=ctx.createBiquadFilter();globalLPF.type="lowpass";globalLPF.frequency.value=lpfFaderToHz(lpfValue);globalLPF.Q.value=lpfQ;

  globalHPF=ctx.createBiquadFilter();globalHPF.type="highpass";globalHPF.frequency.value=hpfFaderToHz(hpfValue);globalHPF.Q.value=hpfQ;
  globalHPF2=ctx.createBiquadFilter();globalHPF2.type="highpass";globalHPF2.frequency.value=hpfSlope===24?hpfFaderToHz(hpfValue):20;globalHPF2.Q.value=hpfQ;
  eqLowNode=ctx.createBiquadFilter();eqLowNode.type="lowshelf";eqLowNode.frequency.value=100;eqLowNode.gain.value=eqLowGain;
  eqLoMidNode=ctx.createBiquadFilter();eqLoMidNode.type="peaking";eqLoMidNode.frequency.value=350;eqLoMidNode.Q.value=0.7;eqLoMidNode.gain.value=eqLoMidGain;
  eqHiMidNode=ctx.createBiquadFilter();eqHiMidNode.type="peaking";eqHiMidNode.frequency.value=2500;eqHiMidNode.Q.value=0.9;eqHiMidNode.gain.value=eqHiMidGain;
  eqHighNode=ctx.createBiquadFilter();eqHighNode.type="highshelf";eqHighNode.frequency.value=8000;eqHighNode.gain.value=eqHighGain;
  // Juno chorus — two modulated delays panned L/R
  chorusGainNode=ctx.createGain();chorusGainNode.gain.value=chorusMix*0.5;
  const dL=ctx.createDelay(0.05),dR=ctx.createDelay(0.05);
  dL.delayTime.value=0.007;dR.delayTime.value=0.009;
  const lL=ctx.createOscillator();lL.type='sine';lL.frequency.value=0.55;
  const lgL=ctx.createGain();lgL.gain.value=0.0025;lL.connect(lgL);lgL.connect(dL.delayTime);lL.start();
  const lR=ctx.createOscillator();lR.type='sine';lR.frequency.value=0.73;
  const lgR=ctx.createGain();lgR.gain.value=0.003;lR.connect(lgR);lgR.connect(dR.delayTime);lR.start();
  const pL=ctx.createStereoPanner();pL.pan.value=-0.65;
  const pR=ctx.createStereoPanner();pR.pan.value=0.65;
  reverb=createDattorroReverb();
  // True insert crossfade: mix=0% = fully dry, mix=100% = fully wet, level-stable.
  reverbGain=ctx.createGain();reverbGain.gain.value=reverbMix;
  dryGain=ctx.createGain();dryGain.gain.value=1-reverbMix;
  delayNode=ctx.createDelay(2);delayNode.delayTime.value=delayTimeVal;
  delayGainN=ctx.createGain();delayGainN.gain.value=delayMixVal*0.7;
  delayFB=ctx.createGain();delayFB.gain.value=delayFeedback;
  const dLP=ctx.createBiquadFilter();dLP.type="lowpass";dLP.frequency.value=3000;dLP.Q.value=0.5;

  const _widthLFO=ctx.createOscillator();_widthLFO.type='sine';_widthLFO.frequency.value=0.3;

  globalLPF2.connect(chorusGainNode);chorusGainNode.connect(dL);chorusGainNode.connect(dR);dL.connect(pL);dR.connect(pR);pL.connect(_chorBus);pR.connect(_chorBus);

  const rvModLFOL=ctx.createOscillator();rvModLFOL.type='sine';rvModLFOL.frequency.value=0.7;
  const rvModLFOR=ctx.createOscillator();rvModLFOR.type='sine';rvModLFOR.frequency.value=0.97;

function createMovementReverb(){
  const conv=ctx.createConvolver();
  const sr=ctx.sampleRate;
  const decay=1.6,len=Math.floor(sr*decay);
  const ir=ctx.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){
    const data=ir.getChannelData(ch);
    for(let i=0;i<len;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);
  }
  conv.buffer=ir;
  const inp=ctx.createGain();
  const out=ctx.createGain();
  const wet=ctx.createGain();wet.gain.value=0.35;
  const dry=ctx.createGain();dry.gain.value=0.70;
  // Tame the high end so the reverb sits behind the dry hits
  const damp=ctx.createBiquadFilter();damp.type='lowpass';damp.frequency.value=4200;damp.Q.value=0.5;
  inp.connect(dry);dry.connect(out);
  inp.connect(conv);conv.connect(damp);damp.connect(wet);wet.connect(out);
  return {input:inp,output:out};
}

// ─── SYNTH VOICE BUILDER ───
function buildGroup(def,freqs,vol,atk){
  const gG=ctx.createGain();gG.gain.setValueAtTime(0,ctx.currentTime);gG.gain.linearRampToValueAtTime(vol,ctx.currentTime+atk);
  const flt=ctx.createBiquadFilter();flt.type="lowpass";flt.frequency.value=def.fBase*1.5;flt.Q.value=0.5;
  const fL=ctx.createOscillator();fL.type="sine";fL.frequency.value=def.fRate;
  const fG=ctx.createGain();fG.gain.value=def.fMod;
  fL.connect(fG);fG.connect(flt.frequency);fL.start();
  // Second slow filter LFO at an incommensurate rate — beats with fL so the
  // motion never repeats. Random phase per layer so layers don't lock together.
  const fL2=ctx.createOscillator();fL2.type='sine';
  fL2.frequency.value=def.fRate*(0.27+Math.random()*0.13); // ~30% of fRate
  const fG2=ctx.createGain();fG2.gain.value=def.fMod*0.45;
  fL2.connect(fG2);fG2.connect(flt.frequency);fL2.start(ctx.currentTime+Math.random()*4);
  const aL=ctx.createOscillator();aL.type="sine";aL.frequency.value=def.aRate;
  const aG=ctx.createGain();aG.gain.value=def.aMod*vol;
  aL.connect(aG);aG.connect(gG.gain);aL.start();
  // Slow breathing on the group gain — very subtle (±3%), ~80s period
  const bL=ctx.createOscillator();bL.type='sine';
  bL.frequency.value=0.011+Math.random()*0.006;
  const bG=ctx.createGain();bG.gain.value=vol*0.03;
  bL.connect(bG);bG.connect(gG.gain);bL.start(ctx.currentTime+Math.random()*8);
  const oscs=[],lfos=[fL,fL2,aL,bL];
  const spread=0.5;
  freqs.forEach((bf,ni)=>{def.octaves.forEach(oo=>{const f=bf*Math.pow(2,oo);def.timbres.forEach(tb=>{const w=waves[tb.wave];for(let vi=0;vi<tb.count;vi++){const t=tb.count>1?(vi/(tb.count-1))*2-1:0;const o=ctx.createOscillator();o.setPeriodicWave(w);o.frequency.value=f;o.detune.value=t*tb.ds*spread*2.5;const vg=ctx.createGain();vg.gain.value=tb.gain;const pn=ctx.createStereoPanner();pn.pan.value=t*tb.pan*(ni%2===0?1:-1)*(0.3+spread*0.7);const lfo=ctx.createOscillator();lfo.type="sine";lfo.frequency.value=0.01+Math.random()*0.05;const lg=ctx.createGain();lg.gain.value=(0.2+Math.random()*1.5)*(0.1+spread*0.9);lfo.connect(lg);lg.connect(o.detune);lfo.start();lfos.push(lfo);const h=ctx.createDelay(0.01);h.delayTime.value=Math.random()*0.004*spread;o.connect(vg);vg.connect(pn);pn.connect(h);h.connect(flt);o.start();oscs.push(o)}})})});
  flt.connect(gG);gG.connect(master);
  return{oscs,lfos,gain:gG,filter:flt,filterLG:fG,ampMod:aG,breathMod:bG};
}

// Smoothly ramp an AudioParam to a target value. Used by loadPreset so
// FX / filter / EQ parameters crossfade with the pads instead of snapping.
function rampParam(param,target,dur){
  if(!param||!ctx)return;
  const t=ctx.currentTime;
  try{
    param.cancelScheduledValues(t);
    param.setValueAtTime(param.value,t);
    param.linearRampToValueAtTime(target,t+dur);
  }catch(e){param.value=target;}
}
function fadeOut(nodes,time){
  if(!nodes)return;const now=ctx.currentTime;
  nodes.gain.gain.cancelScheduledValues(now);nodes.gain.gain.setValueAtTime(nodes.gain.gain.value,now);
  nodes.gain.gain.linearRampToValueAtTime(0,now+time);
  // Critical: also collapse the amplitude + breathing LFOs to 0 in lock-step.
  // Otherwise they keep modulating gG.gain around 0 even after the ramp ends,
  // producing audible signal long after a "fade out" is supposed to be silent.
  if(nodes.ampMod){nodes.ampMod.gain.cancelScheduledValues(now);nodes.ampMod.gain.setValueAtTime(nodes.ampMod.gain.value,now);nodes.ampMod.gain.linearRampToValueAtTime(0,now+time);}
  if(nodes.breathMod){nodes.breathMod.gain.cancelScheduledValues(now);nodes.breathMod.gain.setValueAtTime(nodes.breathMod.gain.value,now);nodes.breathMod.gain.linearRampToValueAtTime(0,now+time);}
  setTimeout(()=>{nodes.oscs.forEach(o=>{try{o.stop()}catch(e){}});nodes.lfos.forEach(o=>{try{o.stop()}catch(e){}});try{nodes.gain.disconnect()}catch(e){};try{nodes.filter.disconnect()}catch(e){}},time*1000+500);
}

function getStaticFreqs(root,def){const r=noteFreq(root,ROOT_OCT);return def.rootOnly?[r]:[r,semiFreq(r,7)]}
function getEvolveFreq(root,ei){const r=noteFreq(root,ROOT_OCT);return CHORD_TYPES[ei].semis.map(s=>semiFreq(r,s))}

// True shimmer: Dattorro plate with pitch-shifted feedback loop. Each pass
// through the loop is raised an octave, producing an ascending halo cascade
// that climbs higher and higher until the loop gain dies away.
//   in → reverb → out
//             ↘ tap → fbGain → HPF/LPF → pitch+12 → reverb input
let shimmerNode=null;
function createShimmerReverb(){
  const inputG=ctx.createGain();
  const outputG=ctx.createGain();outputG.gain.value=0;
  // Dattorro reverb — bright, medium decay (the cascade itself extends the tail)
  const reverb=new AudioWorkletNode(ctx,'DattorroReverb',{outputChannelCount:[2]});
  reverb.parameters.get('wet').value=1.0;
  reverb.parameters.get('dry').value=0.0;
  reverb.parameters.get('bandwidth').value=0.9999;
  reverb.parameters.get('damping').value=0.06;
  reverb.parameters.get('decay').value=0.72;
  reverb.parameters.get('preDelay').value=Math.round(0.005*ctx.sampleRate);
  reverb.parameters.get('inputDiffusion1').value=0.75;
  reverb.parameters.get('inputDiffusion2').value=0.625;
  reverb.parameters.get('decayDiffusion1').value=0.7;
  reverb.parameters.get('decayDiffusion2').value=0.5;
  reverb.parameters.get('excursionRate').value=0.4;
  reverb.parameters.get('excursionDepth').value=0.5;
  // Input → reverb (mixes with feedback)
  inputG.connect(reverb);
  reverb.connect(outputG);
  // Pitch-shifted feedback loop — the heart of the shimmer cascade.
  // Phase-vocoder pitch shifter (Phaze) for clean +12 with no granular grit.
  let pitchNode=null;
  try{
    pitchNode=new AudioWorkletNode(ctx,'phase-vocoder-processor');
    pitchNode.parameters.get('pitchFactor').value=2.0; // +12 semitones (octave up)
  }catch(e){}
  if(pitchNode){
    // HPF stops bass buildup. LPF can be relaxed since the reverb damping
    // already attenuates highs naturally per tank pass. Chorus after pitch
    // micropitches each cascade so passes detune slightly — anti-stacking.
    const fbHPF=ctx.createBiquadFilter();fbHPF.type='highpass';fbHPF.frequency.value=180;fbHPF.Q.value=0.5;
    const fbLPF=ctx.createBiquadFilter();fbLPF.type='lowpass';fbLPF.frequency.value=6500;fbLPF.Q.value=0.5;
    const fbGain=ctx.createGain();fbGain.gain.value=0.75;
    // Juno-style chorus: dry + modulated delay parallel paths
    const chMix=ctx.createGain();
    const chDry=ctx.createGain();chDry.gain.value=0.6;
    const chWet=ctx.createGain();chWet.gain.value=0.4;
    const chDelay=ctx.createDelay(0.05);chDelay.delayTime.value=0.014;
    const chLFO=ctx.createOscillator();chLFO.type='sine';chLFO.frequency.value=0.83;
    const chLFOG=ctx.createGain();chLFOG.gain.value=0.0035;
    chLFO.connect(chLFOG);chLFOG.connect(chDelay.delayTime);chLFO.start();
    // Wire: reverb tap → fbGain → HPF → LPF → pitch+12 → [dry + chorused] → reverb input
    reverb.connect(fbGain);
    fbGain.connect(fbHPF);fbHPF.connect(fbLPF);fbLPF.connect(pitchNode);
    pitchNode.connect(chDry);chDry.connect(chMix);
    pitchNode.connect(chDelay);chDelay.connect(chWet);chWet.connect(chMix);
    chMix.connect(reverb);
  }
  // Haas stereo spread on the dry-tap output
  const dL=ctx.createDelay(0.05);dL.delayTime.value=0.011;
  const dR=ctx.createDelay(0.05);dR.delayTime.value=0.019;
  const pL=ctx.createStereoPanner();pL.pan.value=-0.8;
  const pR=ctx.createStereoPanner();pR.pan.value=0.8;
  outputG.connect(dL);dL.connect(pL);
  outputG.connect(dR);dR.connect(pR);
  return{input:inputG,output:outputG,stereoL:pL,stereoR:pR};
}
function startShimmer(vol,atk){
  if(atk==null)atk=ATTACK*2;
  if(!shimmerNode)return; // created in initAudio
  shimmerGainNode=shimmerNode.output;
  shimmerGainNode.gain.cancelScheduledValues(ctx.currentTime);
  shimmerGainNode.gain.setValueAtTime(shimmerGainNode.gain.value,ctx.currentTime);
  shimmerGainNode.gain.linearRampToValueAtTime(vol*1.5,ctx.currentTime+atk);
}
function stopShimmer(){
  if(!shimmerNode)return;
  const g=shimmerNode.output;
  g.gain.cancelScheduledValues(ctx.currentTime);
  g.gain.setValueAtTime(g.gain.value,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0,ctx.currentTime+RELEASE);
  shimmerGainNode=null;
}

function startPad(def,vol,root,ei,atk,xfo){
  if(atk==null)atk=ATTACK;if(xfo==null)xfo=XFADE;
  if(def.type==="granular"){startGranular(vol,atk);return}
  if(vol<=0){stopPad(def.id);return;}
  // If the existing node is still in its fade-in (hasn't reached vol yet),
  // cut it off fast. A full XFADE crossfade only makes sense from a
  // steady-state pad — otherwise rapid key presses stack dozens of
  // partially-faded-in oscillator groups and starve CPU on the iPad.
  const now=ctx.currentTime;
  const oldS=staticNodes[def.id], oldE=evolveNodes[def.id];
  const sxfo=(oldS&&oldS._atkUntil>now)?0.3:xfo;
  const exfo=(oldE&&oldE._atkUntil>now)?0.3:xfo;
  fadeOut(oldS,sxfo);fadeOut(oldE,exfo);
  staticNodes[def.id]=buildGroup(def,getStaticFreqs(root,def),vol,atk);
  staticNodes[def.id]._atkUntil=now+atk;
  if(!def.rootOnly){
    evolveNodes[def.id]=buildGroup(def,getEvolveFreq(root,ei),vol,atk);
    evolveNodes[def.id]._atkUntil=now+atk;
  }
}
function stopPad(id,rel){
  if(rel==null)rel=RELEASE;
  const def=PAD_LAYERS.find(l=>l.id===id);
  if(def&&def.type==="granular"){stopGranular(rel);return}
  fadeOut(staticNodes[id],rel);fadeOut(evolveNodes[id],rel);
  delete staticNodes[id];delete evolveNodes[id];
}

function evolveVoice(ei){
  const ef=getEvolveFreq(homeRoot,ei);
  const now=ctx.currentTime;
  PAD_LAYERS.forEach(l=>{
    if(l.type==="granular")return;
    if(layerState[l.id].volume>0&&!l.rootOnly){
      // Match startPad's quick-cut behaviour: if the node we're replacing is
      // still in its fade-in, cut it short so a key press hitting during an
      // evolve doesn't stack two slow XFADE-out groups.
      const old=evolveNodes[l.id];
      const xfo=(old&&old._atkUntil>now)?0.3:XFADE;
      fadeOut(old,xfo);
      evolveNodes[l.id]=buildGroup(l,ef,layerState[l.id].volume,XFADE);
      evolveNodes[l.id]._atkUntil=now+XFADE;
    }
  });
}

// ─── EVOLUTION ───
function scheduleEvolve(){
  if(evolveTimer)clearTimeout(evolveTimer);
  // When click+beat-sync is on, fireClick handles evolution deterministically — skip random timer
  if(evolveOnBeat&&clickActive){evolveTimer=null;return;}
  const cur=currentEvolve;
  const base=10000+Math.random()*14000;const time=base*(1.5-evolveSpeed*0.8);
  evolveTimer=setTimeout(()=>{
    if(!evolving){scheduleEvolve();return}
    const cands=CHORD_TYPES.map((_,i)=>i).filter(i=>i!==cur&&enabledEvolveIdx.has(i));
    if(!cands.length){scheduleEvolve();return}
    const wts=cands.map(i=>CHORD_TYPES[i].weight);const tot=wts.reduce((a,b)=>a+b,0);
    let r=Math.random()*tot,next=cands[0];
    for(let i=0;i<cands.length;i++){r-=wts[i];if(r<=0){next=cands[i];break}}
    currentEvolve=next;const _se=document.getElementById('stateEvolve');if(_se){_se.textContent=CHORD_TYPES[next].name;_se.classList.add('evo-flash');setTimeout(()=>_se.classList.remove('evo-flash'),700);}
    evolveVoice(next);scheduleEvolve();
  },time);
}

function setPendingChord(idx){
  const pend=document.getElementById('statePending');
  const sep=document.getElementById('statePendSep');
  if(pend){pend.textContent=CHORD_TYPES[idx].name;pend.style.opacity='1';}
  if(sep)sep.style.opacity='1';
}
function clearPendingChord(){
  const pend=document.getElementById('statePending');
  const sep=document.getElementById('statePendSep');
  if(pend)pend.style.opacity='0';
  if(sep)sep.style.opacity='0';
}

// ─── ARPEGGIATOR ───
function _arpBarSec(){return 60/clickBPM*4;}
function _arpExtraOct(){
  // Subtle 16-bar variation: on the last bar of every 16-bar cycle, drift the
  // arp ±1 octave (alternating direction each cycle). Returns -1, 0, or +1.
  const beat=clickActive?clickBeat:Math.floor(arpStep*arpRate*4);
  const bar=Math.floor(beat/4);
  if(bar%16!==15) return 0;
  return (Math.floor(bar/16)%2===0) ? 1 : -1;
}
function getArpVoicing(chord){
  if(chord.voicing)return chord.voicing;
  const semis=chord.semis;
  if(semis.length===1)return[0,semis[0],12];
  if(semis.length===2)return[semis[0],semis[1],semis[0]+12];
  // 3+ notes (typically the Custom chord) — play every note the user picked,
  // bracketed by root and root+12 so the cycle resolves musically.
  return[0,...semis,semis[0]+12];
}
function fireArpNote(){
  if(!ctx||!waves||arpVol<=0)return;
  const voicing=getArpVoicing(CHORD_TYPES[currentEvolve]);
  const vl=voicing.length;
  const semitone=voicing[arpStep%vl];
  const octShift=Math.floor(arpStep/vl)%2;
  const extraOct=_arpExtraOct();
  const freq=semiFreq(noteFreq(homeRoot,ROOT_OCT+1+octShift+arpOct+extraOct),semitone);
  const noteDur=arpRate*_arpBarSec();
  if(arpVoice==='soft'){
    // Soft voice: triangle, 40ms attack, warm fixed filter, gentle detune
    const atk=0.04;
    [[-0.4,-4,0.9],[0,0,0.75],[0.4,+4,0.9]].forEach(([panV,det,velScale])=>{
      const osc=ctx.createOscillator();
      const filt=ctx.createBiquadFilter();
      const env=ctx.createGain();
      const pan=ctx.createStereoPanner();
      osc.type='triangle';
      osc.frequency.value=freq;
      osc.detune.value=det;
      filt.type='lowpass';filt.frequency.value=Math.min(900+freq*0.25,2000);filt.Q.value=0.7;
      const pk=arpVol*0.20*velScale;
      const t0=ctx.currentTime;
      const decT=Math.min(noteDur*0.4,0.6);
      env.gain.setValueAtTime(0,t0);
      env.gain.linearRampToValueAtTime(pk,t0+atk);
      env.gain.linearRampToValueAtTime(pk*0.65,t0+decT);
      env.gain.linearRampToValueAtTime(0,t0+noteDur);
      pan.pan.value=panV;
      osc.connect(filt);filt.connect(env);env.connect(pan);
      pan.connect(arpBus||master);
      osc.start();osc.stop(t0+noteDur+0.5);
      osc.onended=()=>{try{osc.disconnect();filt.disconnect();env.disconnect();pan.disconnect()}catch(e){}};
    });
  } else if(arpVoice==='sine'){
    // Sine voice: clean fundamental, slow soft attack, gentle stereo spread
    const atk=0.04;
    [[-0.3,-3,1.0],[0.3,+3,1.0]].forEach(([panV,det,velScale])=>{
      const osc=ctx.createOscillator();
      const env=ctx.createGain();
      const pan=ctx.createStereoPanner();
      osc.type='sine';osc.frequency.value=freq;osc.detune.value=det;
      const pk=arpVol*0.23*velScale;
      const t0=ctx.currentTime;
      env.gain.setValueAtTime(0,t0);
      env.gain.linearRampToValueAtTime(pk,t0+atk);
      env.gain.linearRampToValueAtTime(pk*0.55,t0+Math.min(noteDur*0.5,0.8));
      env.gain.linearRampToValueAtTime(0,t0+noteDur);
      pan.pan.value=panV;
      osc.connect(env);env.connect(pan);
      pan.connect(arpBus||master);
      osc.start();osc.stop(t0+noteDur+0.5);
      osc.onended=()=>{try{osc.disconnect();env.disconnect();pan.disconnect()}catch(e){}};
    });

    const atk=0.022;

    [[-0.75,-13,1.0],[0,0,0.82],[0.75,+13,1.0]].forEach(([panV,det,velScale])=>{
      const osc=ctx.createOscillator();
      const filt=ctx.createBiquadFilter();
      const env=ctx.createGain();
      const pan=ctx.createStereoPanner();
      osc.type='sawtooth';
      osc.frequency.value=freq;
      osc.detune.value=det;
      filt.type='lowpass';filt.Q.value=0.9;

      const t0=ctx.currentTime;
      filt.frequency.setValueAtTime(brightHz,t0);
      filt.frequency.exponentialRampToValueAtTime(darkHz,t0+dec);
      const pk=arpVol*0.165*velScale;
      env.gain.setValueAtTime(0,t0);
      env.gain.linearRampToValueAtTime(pk,t0+atk);
      if(noteDur>atk+rel){env.gain.linearRampToValueAtTime(pk*0.45,t0+dec);}
      env.gain.linearRampToValueAtTime(0,t0+noteDur);
      pan.pan.value=panV;
      osc.connect(filt);filt.connect(env);env.connect(pan);
      pan.connect(arpBus||master);
      osc.start();osc.stop(t0+noteDur+0.5);
      osc.onended=()=>{try{osc.disconnect();filt.disconnect();env.disconnect();pan.disconnect()}catch(e){}};
    });
  }
  arpStep++;
}
function scheduleArp(){

}

// ─── MOVEMENT (rhythmic percussion layer) ───
function fireMovementHit(t,sound,vel){
  if(!movementReverb||audioPaused||_fadeActive)return;
  vel=vel||1;
  if(sound==='lo'){
    // 808-style kick: fast transient pitch sweep + long sub tail
    const osc=ctx.createOscillator(),env=ctx.createGain();
    osc.type='sine';
    const f0=145+(Math.random()*10-5);
    osc.frequency.setValueAtTime(f0,t);
    osc.frequency.exponentialRampToValueAtTime(48,t+0.05);    // snappy click
    osc.frequency.exponentialRampToValueAtTime(40,t+0.5);     // settled boom
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(movementVol*1.2*vel,t+0.001);   // punch
    env.gain.exponentialRampToValueAtTime(movementVol*0.55*vel,t+0.08);
    env.gain.exponentialRampToValueAtTime(0.0008,t+0.55);
    osc.connect(env);env.connect(movementReverb.input);
    osc.start(t);osc.stop(t+0.6);
    osc.onended=()=>{try{osc.disconnect();env.disconnect()}catch(e){}};
  } else if(sound==='md'){
    // 808-style tom: smaller pitch drop, mid-tier sustain
    const osc=ctx.createOscillator(),env=ctx.createGain(),pan=ctx.createStereoPanner();
    osc.type='sine';
    const f0=260+(Math.random()*16-8);
    osc.frequency.setValueAtTime(f0,t);
    osc.frequency.exponentialRampToValueAtTime(110,t+0.05);
    osc.frequency.exponentialRampToValueAtTime(95,t+0.35);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(movementVol*0.85*vel,t+0.001);
    env.gain.exponentialRampToValueAtTime(movementVol*0.38*vel,t+0.06);
    env.gain.exponentialRampToValueAtTime(0.0008,t+0.4);
    pan.pan.value=-0.12+(Math.random()*0.1-0.05);
    osc.connect(env);env.connect(pan);pan.connect(movementReverb.input);
    osc.start(t);osc.stop(t+0.45);
    osc.onended=()=>{try{osc.disconnect();env.disconnect();pan.disconnect()}catch(e){}};
  } else if(sound==='hh'){
    // Darker, fuller "lofi shaker" — HP+LP shape gives body, no brittle top
    const buf=ctx.createBuffer(1,1024,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<1024;i++) data[i]=Math.random()*2-1;
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=1700;hp.Q.value=0.5;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=4200+(Math.random()*400-200);lp.Q.value=0.7;
    const env=ctx.createGain();
    const pan=ctx.createStereoPanner();pan.pan.value=0.3+(Math.random()*0.2-0.1);
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(movementVol*0.22*vel,t+0.001);
    env.gain.exponentialRampToValueAtTime(0.0008,t+0.055);
    src.connect(hp);hp.connect(lp);lp.connect(env);env.connect(pan);pan.connect(movementReverb.input);
    src.start(t);src.stop(t+0.08);
    src.onended=()=>{try{src.disconnect();hp.disconnect();lp.disconnect();env.disconnect();pan.disconnect()}catch(e){}};
  }
}
function pickMovementSound(stepInPat,bar){
  const pat=MOVEMENT_PATTERNS[movementPattern];if(!pat)return null;
  const steps=_movSteps(pat);if(!steps)return null;
  const len=steps.length;
  let sound=steps[stepInPat%len];
  // Variation fill every 8 bars: occasional ghost hat near end of bar
  const stepsPerBar=timeSig==='6/8'?12:16;
  const lastQtr=stepsPerBar-4;
  if(bar%8===7 && (stepInPat%stepsPerBar)>=lastQtr && !sound && Math.random()<0.4) sound='hh';
  return sound;
}
function _firePickedMovement(t,sound){
  if(!sound)return;
  const vel=0.88+Math.random()*0.24;
  if(Array.isArray(sound)) sound.forEach(s=>fireMovementHit(t,s,vel));
  else fireMovementHit(t,sound,vel);
}
function fireMovementStep(){
  const pat=MOVEMENT_PATTERNS[movementPattern];if(!pat)return;
  const steps=_movSteps(pat);if(!steps)return;
  const len=steps.length;
  const stepInPat=movementStep%len;
  const stepsPerBar=timeSig==='6/8'?12:16;
  const bar=Math.floor(movementStep/stepsPerBar);
  _firePickedMovement(ctx.currentTime,pickMovementSound(stepInPat,bar));
  movementStep++;
}
function scheduleMovement(){
  if(movementTimer)clearTimeout(movementTimer);

function dampFaderToHz(v){return Math.exp(Math.log(800)+v*(Math.log(8000)-Math.log(800)))}
function reverbSizeToFB(v){return Math.pow(10,-1.5/(1+v*19))}
// Rebuild the WaveShaper curve for the given saturation amount.
// At amt=0 the curve is identity (no coloration). At amt=1 it's tanh(x*2.5)/tanh(2.5).
function buildSatCurve(amt){
  const c=new Float32Array(512);
  if(amt<0.005){for(let i=0;i<512;i++)c[i]=(i*2/511)-1;}
  else{const k=amt*3.5;const n=Math.tanh(k);for(let i=0;i<512;i++){const x=(i*2/511)-1;c[i]=Math.tanh(x*k)/n;}}
  return c;
}
function lpfFaderToHz(v){return Math.exp(Math.log(100)+v*v*(Math.log(20000)-Math.log(100)))}
function hpfFaderToHz(v){if(v<0.01)return 20;return Math.exp(Math.log(20)+v*(Math.log(500)-Math.log(20)))}
function formatHz(hz){return hz>=1000?(hz/1000).toFixed(1)+'kHz':Math.round(hz)+'Hz'}
function formatDb(db){return(db>0?'+':db<0?'':'')+db.toFixed(1)+'dB'}
function sliderToQ(r){return 0.1+r*11.9}
function eqGainToSlider(db){return(db+12)/24}

function buildKeys(){
  const row=document.getElementById('keyRow');row.innerHTML='';
  const flats=new Set(['Db','Eb','Gb','Ab','Bb']);
  NOTES.forEach(n=>{
    const btn=document.createElement('button');
    btn.className='key-btn'+(n===homeRoot?' active':'')+(n===homeRoot&&audioPaused?' paused':'');
    btn.textContent=n;
    btn.onclick=()=>{
      if(n===homeRoot){
        audioPaused=!audioPaused;
        if(audioPaused){const t=ctx.currentTime;master.gain.cancelScheduledValues(t);master.gain.setValueAtTime(master.gain.value,t);master.gain.linearRampToValueAtTime(0,t+2.0);if(_drumMaster){_drumMaster.gain.cancelScheduledValues(t);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,t);_drumMaster.gain.linearRampToValueAtTime(0,t+2.0);}if(arpBus){arpBus.gain.cancelScheduledValues(t);arpBus.gain.setValueAtTime(arpBus.gain.value,t);arpBus.gain.linearRampToValueAtTime(0,t+2.0);}if(_sumBus){_sumBus.gain.cancelScheduledValues(t);_sumBus.gain.setValueAtTime(_sumBus.gain.value,t);_sumBus.gain.linearRampToValueAtTime(0,t+2.0);}stopArp();btn.classList.add('paused');if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';}
        else{const t=ctx.currentTime;ctx.resume();if(arpVol>0)startArp();master.gain.linearRampToValueAtTime(masterVol,t+3.0);if(_drumMaster)_drumMaster.gain.linearRampToValueAtTime(masterVol,t+3.0);if(arpBus)arpBus.gain.linearRampToValueAtTime(1,t+3.0);if(_sumBus)_sumBus.gain.linearRampToValueAtTime(0.7,t+3.0);btn.classList.remove('paused');if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';}
        return;
      }
      homeRoot=n;currentPresetName=null;document.getElementById('stateRoot').textContent=n;
      if(audioPaused){
        audioPaused=false;ctx.resume();
        const t=ctx.currentTime;
        // Master itself only needs a quick unmute — we just want it out of the
        // way. The slow musical fade-in is on the layers (already via ATTACK
        // in startPad) and on arpBus / _drumMaster below, so arp and movement
        // come up at the same rate as the pads.
        master.gain.cancelScheduledValues(t);master.gain.setValueAtTime(master.gain.value,t);master.gain.linearRampToValueAtTime(masterVol,t+0.05);
        if(_drumMaster){_drumMaster.gain.cancelScheduledValues(t);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,t);_drumMaster.gain.linearRampToValueAtTime(masterVol,t+ATTACK);}
        if(arpBus){arpBus.gain.cancelScheduledValues(t);arpBus.gain.setValueAtTime(arpBus.gain.value,t);arpBus.gain.linearRampToValueAtTime(1,t+ATTACK);}
        // FX bus was killed at fade-complete to stop reverb/delay overhang —
        // bring it back over ATTACK so reverb and delay tails of the new key
        // build up alongside the pads instead of arriving full-strength.
        if(_sumBus){_sumBus.gain.cancelScheduledValues(t);_sumBus.gain.setValueAtTime(_sumBus.gain.value,t);_sumBus.gain.linearRampToValueAtTime(0.7,t+ATTACK);}
      }
      arpStep=0;
      const firstChord=[...enabledEvolveIdx][0]??0;
      currentEvolve=firstChord;pendingEvolve=-1;
      clearPendingChord();
      document.getElementById('stateEvolve').textContent=CHORD_TYPES[firstChord].name;
      PAD_LAYERS.forEach(l=>{
        if(layerState[l.id].volume<=0)return;
        startPad(l,layerState[l.id].volume,homeRoot,currentEvolve);
      });
      scheduleEvolve();
      buildKeys();saveSettings();
    };
    row.appendChild(btn);
  });
}

function randomise(){
  if(!ctx)return;
  // ── Chords: swap 2-4, always evolve to a fresh chord ──
  const enabled=[...enabledEvolveIdx];
  const disabled=CHORD_TYPES.map((_,i)=>i).filter(i=>!enabledEvolveIdx.has(i)&&i!==CUSTOM_CHORD_IDX);
  if(enabled.length>1&&disabled.length>0){
    for(let i=enabled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[enabled[i],enabled[j]]=[enabled[j],enabled[i]];}
    for(let i=disabled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[disabled[i],disabled[j]]=[disabled[j],disabled[i]];}
    const swapCount=Math.min(2+Math.floor(Math.random()*3),enabled.length-1,disabled.length);
    for(let i=0;i<swapCount;i++)enabledEvolveIdx.delete(enabled[i]);
    for(let i=0;i<swapCount;i++)enabledEvolveIdx.add(disabled[i]);
  }
  const avail=[...enabledEvolveIdx];
  currentEvolve=avail[Math.floor(Math.random()*avail.length)];
  evolveVoice(currentEvolve);
  document.getElementById('stateEvolve').textContent=CHORD_TYPES[currentEvolve].name;
  // ── FX: wider, more extreme ranges ──
  const t=ctx.currentTime+0.5;
  reverbMix=0.35+Math.random()*0.65;
  reverbGain.gain.linearRampToValueAtTime(reverbMix,t);dryGain.gain.linearRampToValueAtTime(1-reverbMix,t);
  if(reverbModWet)reverbModWet.gain.linearRampToValueAtTime(reverbMod*0.7*reverbMix,t);
  reverbSize=0.25+Math.random()*0.75;
  if(reverb&&reverb.fbGain)reverb.fbGain.gain.linearRampToValueAtTime(reverbSizeToFB(reverbSize),t);
  const newShim=Math.random()*0.4;const wasShim=shimmerVol;shimmerVol=newShim;
  if(newShim>0&&wasShim===0)startShimmer(newShim);else if(newShim<=0)stopShimmer();else if(shimmerNode)shimmerNode.output.gain.linearRampToValueAtTime(newShim*1.5,t);
  delayMixVal=Math.random()*0.75;
  if(delayGainN)delayGainN.gain.linearRampToValueAtTime(delayMixVal*0.7,t);
  if(_drumDelaySend)_drumDelaySend.gain.linearRampToValueAtTime(delayMixVal*1.5,t);
  if(!delaySync){delayTimeVal=0.05*Math.pow(1.0/0.05,Math.random());if(delayNode)delayNode.delayTime.linearRampToValueAtTime(delayTimeVal,t);}
  chorusMix=Math.random()*0.9;
  if(chorusGainNode)chorusGainNode.gain.linearRampToValueAtTime(chorusMix*0.5,t);
  lpfValue=0.35+Math.random()*0.65;
  const hz=lpfFaderToHz(lpfValue);

function toggleCustomChordPanel(btn){

function toggleCustomNote(semi){
  if(semi===0)return;
  const idx=customChordSemis.indexOf(semi);
  if(idx>=0){if(customChordSemis.length<=1)return;customChordSemis.splice(idx,1);}
  else{customChordSemis.push(semi);customChordSemis.sort((a,b)=>a-b);}
  CHORD_TYPES[CUSTOM_CHORD_IDX].semis=[...customChordSemis];
  if(currentEvolve===CUSTOM_CHORD_IDX)evolveVoice(CUSTOM_CHORD_IDX);
  saveSettings();buildEditSheet();
}

function toggleSeqPanel(btn){
  seqPanelOpen=!seqPanelOpen;
  const panel=document.getElementById('seqPanel');if(!panel)return;
  panel.classList.toggle('open',seqPanelOpen);
  btn.textContent=seqPanelOpen?'Step Sequencer ▴':'Step Sequencer ▾';

function toggleSeqStep(row,step){
  customSeqGrid[row][step]=!customSeqGrid[row][step];
  rebuildCustomPattern();
  saveSettings();buildEditSheet();
}
function rebuildCustomPattern(){
  ['4/4','6/8'].forEach(sig=>{
    const len=sig==='6/8'?12:16;
    MOVEMENT_PATTERNS[CUSTOM_PAT_IDX].steps[sig]=Array.from({length:len},(_,i)=>{
      const sounds=['lo','md','hh'].filter(r=>customSeqGrid[r][i]);
      return sounds.length===0?'':sounds.length===1?sounds[0]:sounds;
    });
  });
}

// ─── VISUALISER ───
function startVis(){
  const canvas=document.getElementById('visualiser');const cx=canvas.getContext('2d');
  const bufLen=analyser.frequencyBinCount;const freqData=new Uint8Array(bufLen);
  const timeData=new Uint8Array(bufLen);
  const nyquist=ctx.sampleRate/2;
  const binStart=Math.floor(80/nyquist*bufLen),binEnd=Math.ceil(1200/nyquist*bufLen);
  const visBins=binEnd-binStart;
  const sm=new Float32Array(visBins);
  function draw(){
    animFrame=requestAnimationFrame(draw);
    const w=canvas.clientWidth*devicePixelRatio||canvas.width;
    const h=canvas.clientHeight*devicePixelRatio||canvas.height;
    if(canvas.width!==w){canvas.width=w}
    if(canvas.height!==h){canvas.height=h}
    analyser.getByteFrequencyData(freqData);
    analyser.getByteTimeDomainData(timeData);
    cx.clearRect(0,0,w,h);
    // Spectrum fill (80Hz-1200Hz, warm focus)
    for(let i=0;i<visBins;i++){const bi=binStart+i;sm[i]+=(freqData[bi]/255-sm[i])*0.22;}
    cx.beginPath();
    for(let i=0;i<visBins;i++){const x=(i/visBins)*w,y=h-sm[i]*h*0.82;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}
    cx.lineTo(w,h);cx.lineTo(0,h);cx.closePath();
    const gFill=cx.createLinearGradient(0,h*0.1,0,h);
    gFill.addColorStop(0,'rgba(196,145,94,0.22)');
    gFill.addColorStop(0.5,'rgba(140,110,80,0.1)');
    gFill.addColorStop(1,'rgba(196,145,94,0)');
    cx.fillStyle=gFill;cx.fill();
    // Spectrum edge line
    cx.beginPath();
    for(let i=0;i<visBins;i++){const x=(i/visBins)*w,y=h-sm[i]*h*0.82;if(i===0)cx.moveTo(x,y);else cx.lineTo(x,y)}
    cx.strokeStyle='rgba(196,145,94,0.45)';cx.lineWidth=1.5;cx.stroke();
    // Waveform overlay (very subtle)
    cx.beginPath();
    const slW=w/bufLen;
    for(let i=0;i<bufLen;i++){const v=timeData[i]/128,y=h*0.5+(v-1)*h*0.38;if(i===0)cx.moveTo(0,y);else cx.lineTo(i*slW,y)}
    cx.strokeStyle='rgba(255,255,255,0.07)';cx.lineWidth=1;cx.stroke();
  }
  draw();
}

let _fadeTimer=null,_fadeCountT=null,_fadeActive=false;
function triggerFade(){
  if(!ctx||!master)return;
  if(_fadeActive){cancelFade();return;}
  _fadeActive=true;
  const DUR=6;
  master.gain.cancelScheduledValues(ctx.currentTime);
  master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
  master.gain.linearRampToValueAtTime(0,ctx.currentTime+DUR);
  if(_drumMaster){_drumMaster.gain.cancelScheduledValues(ctx.currentTime);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,ctx.currentTime);_drumMaster.gain.linearRampToValueAtTime(0,ctx.currentTime+DUR);}
  const btn=document.getElementById('fadeBtn');
  let remaining=DUR;
  function tick(){btn.textContent=remaining+'s';remaining--;if(remaining>0)_fadeCountT=setTimeout(tick,1000);}
  if(btn){btn.classList.add('fading');tick();}
  _fadeTimer=setTimeout(()=>{
    _fadeActive=false;audioPaused=true;stopArp();stopMovement();
    // Snap layers to silence (20ms) BEFORE bringing master back, otherwise
    // the old key's still-running pads become audible at full volume the
    // moment master returns — the "old key tail" bug. Shimmer is left
    // running so its slider position is preserved; with master silent + no
    // pad input, it naturally decays.
    PAD_LAYERS.forEach(l=>stopPad(l.id,0.02));
    // Master is at 0 from the fade — bring it back to the user's volume now
    // (while the bus is silent post-teardown), so the next key press's
    // ATTACK ramp on the layers is what actually defines the fade-in.
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.setValueAtTime(0,ctx.currentTime);
    master.gain.linearRampToValueAtTime(masterVol,ctx.currentTime+0.05);
    // Drum bus and arp bus stay at 0 — the next key press will fade them up
    // over ATTACK so movement and arp join in at the same rate as the pads.
    if(_drumMaster){_drumMaster.gain.cancelScheduledValues(ctx.currentTime);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,ctx.currentTime);_drumMaster.gain.linearRampToValueAtTime(0,ctx.currentTime+0.05);}
    if(arpBus){arpBus.gain.cancelScheduledValues(ctx.currentTime);arpBus.gain.setValueAtTime(arpBus.gain.value,ctx.currentTime);arpBus.gain.linearRampToValueAtTime(0,ctx.currentTime+0.05);}
    // Kill the FX-return bus too so any reverb / delay / shimmer tails that
    // were still echoing through their internal feedback loops are silenced
    // — otherwise that residue bleeds into the next key as "overhang". The
    // next key press will ramp _sumBus back up over ATTACK alongside the
    // layers and arp/drum buses.
    if(_sumBus){_sumBus.gain.cancelScheduledValues(ctx.currentTime);_sumBus.gain.setValueAtTime(_sumBus.gain.value,ctx.currentTime);_sumBus.gain.linearRampToValueAtTime(0,ctx.currentTime+0.05);}
    // Deactivate any selected key — next press becomes a fresh start.
    homeRoot='';
    buildKeys();
    if(btn){btn.classList.remove('fading');btn.textContent='Stop';}
  },DUR*1000+100);
}
function cancelFade(){
  clearTimeout(_fadeTimer);clearTimeout(_fadeCountT);_fadeTimer=null;_fadeCountT=null;_fadeActive=false;
  if(!audioPaused){
    master.gain.cancelScheduledValues(ctx.currentTime);
    master.gain.setValueAtTime(master.gain.value,ctx.currentTime);
    master.gain.linearRampToValueAtTime(masterVol,ctx.currentTime+0.5);
    if(_drumMaster){_drumMaster.gain.cancelScheduledValues(ctx.currentTime);_drumMaster.gain.setValueAtTime(_drumMaster.gain.value,ctx.currentTime);_drumMaster.gain.linearRampToValueAtTime(masterVol,ctx.currentTime+0.5);}
  }
  const btn=document.getElementById('fadeBtn');if(btn){btn.classList.remove('fading');btn.textContent='Stop';}
}

  // and Notes / mail can append signatures. Pull out the JSON object.

function enableMultiOut(){
  if(!ctx||!limiter||!clickOutBus)return;
  const max=ctx.destination.maxChannelCount;
  if(max<3){buildEditSheet();return;}
  ctx.destination.channelCount=Math.min(4,max);
  ctx.destination.channelCountMode='explicit';
  ctx.destination.channelInterpretation='discrete';
  _multiOutMerger=ctx.createChannelMerger(Math.min(4,max));
  _multiOutMerger.connect(ctx.destination);
  _multiOutSplitter=ctx.createChannelSplitter(2);
  try{limiter.disconnect(ctx.destination)}catch(e){}
  limiter.connect(_multiOutSplitter);
  _multiOutSplitter.connect(_multiOutMerger,0,0); // pads L → ch 0
  _multiOutSplitter.connect(_multiOutMerger,1,1); // pads R → ch 1
  try{clickOutBus.disconnect(ctx.destination)}catch(e){}
  clickOutBus.connect(_multiOutMerger,0,2); // click mono → ch 2
  multiOutActive=true;buildEditSheet();
}
function disableMultiOut(){
  if(!multiOutActive)return;
  try{limiter.disconnect(_multiOutSplitter);_multiOutSplitter.disconnect(_multiOutMerger);clickOutBus.disconnect(_multiOutMerger);_multiOutMerger.disconnect(ctx.destination);}catch(e){}
  ctx.destination.channelCount=2;ctx.destination.channelCountMode='max';ctx.destination.channelInterpretation='speakers';
  limiter.connect(ctx.destination);clickOutBus.connect(ctx.destination);
  multiOutActive=false;_multiOutMerger=null;_multiOutSplitter=null;buildEditSheet();
}
async function populateOutputDevices(){

function initPresetDrag(container){

    const onStart=(clientY,e)=>{

      row.classList.add('dragging');

    drag.row.style.transform='translateY('+dy+'px)';
    const rows=[...container.querySelectorAll('.preset-row')];
    rows.forEach((r,i)=>{
      if(r===drag.row)return;

      if(clientY>=rect.top&&clientY<=rect.bottom)drag.targetIdx=i;
    });
  };
  const onEnd=()=>{
    if(!drag)return;
    drag.row.classList.remove('dragging');
    drag.row.style.transform='';
    if(drag.targetIdx>=0&&drag.targetIdx!==drag.origIdx)movePresetTo(drag.name,drag.targetIdx);
    drag=null;

  const _mm=e=>onMove(e.clientY);
  const _tm=e=>{onMove(e.touches[0].clientY);};
  document.addEventListener('mousemove',_mm);
  document.addEventListener('touchmove',_tm,{passive:true});

}

    if(n===homeRoot)return;
