<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1120">
<title>Norcoast Audio</title>
<meta name="description" content="Norcoast Audio — music production, audio engineering and creative tools.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Open Sans', sans-serif;
    background: #0d1120;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .logo svg { opacity: 0; animation: fadeIn 1.2s ease forwards 0.2s; }

  .brand {
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 400;
    color: rgba(255,255,255,0.8);
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.6s;
  }

  .tagline {
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1s;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.4s;
  }

  .links a, .links span {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
    color: rgba(196,145,94,1);
    text-decoration: none;
    padding: 12px 24px;
    border: 1px solid rgba(196,145,94,0.4);
    border-radius: 50px;
    transition: border-color 0.3s, color 0.3s;
  }
  .links a:hover {
    border-color: rgba(196,145,94,0.3);
    color: rgba(196,145,94,0.9);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Subtle background grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="46" stroke="rgba(196,145,94,0.3)" stroke-width="1.5"/>
      <path d="M 20 50 Q 30 35, 40 50 Q 50 65, 60 50 Q 70 35, 80 50" stroke="rgba(196,145,94,0.7)" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M 20 50 Q 30 40, 40 50 Q 50 60, 60 50 Q 70 40, 80 50" stroke="rgba(94,184,138,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M 25 50 Q 35 44, 45 50 Q 55 56, 65 50 Q 75 44, 85 50" stroke="rgba(212,107,138,0.4)" stroke-width="1" stroke-linecap="round" fill="none"/>
      <text x="50" y="30" text-anchor="middle" fill="rgba(196,145,94,0.5)" font-family="'Open Sans',sans-serif" font-size="11" font-weight="600" letter-spacing="1">N</text>
      <circle cx="50" cy="50" r="38" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      <path d="M 30 72 Q 50 82, 70 72" stroke="rgba(106,159,216,0.25)" stroke-width="1" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div class="brand">Norcoast Audio</div>
  <div class="tagline">Music production &amp; creative tools</div>
  <div class="links">
    <a href="/ambience/">Ambience Synth</a>
    <a href="/monitor/">Monitor Controller</a>
    <a href="https://timgosden.com">TimGosden.com</a>
  </div>
</div>
</body>
</html>
