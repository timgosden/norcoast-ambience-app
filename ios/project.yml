name: NorcoastAmbience
options:
  bundleIdPrefix: com.norcoast
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.norcoast.ambience
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: NorcoastAmbience/Info.plist
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  NorcoastAmbience:
    type: application
    platform: iOS
    sources:
      - path: NorcoastAmbience
        excludes:
          - "**/*.md"
      - path: ../public
        type: folder
        name: public
    resources:
      - NorcoastAmbience/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.norcoast.ambience
        INFOPLIST_FILE: NorcoastAmbience/Info.plist
